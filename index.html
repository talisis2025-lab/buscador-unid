<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador Interno | UNID</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #FFC300;
            --primary-dark: #e6b000;
            --secondary: #1a1a1a;
            --bg-body: #f4f7f9;
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --text-light: #636e72;
            --border-color: #edf2f7;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.10), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --input-bg: #fafafa;
            --status-bg: #f8fafc;
        }
        /* Variables Modo Noche */
        body.dark-mode {
            --secondary: #f8f9fa;
            --bg-body: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e2e8f0;
            --text-light: #a0aec0;
            --border-color: #333333;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            --input-bg: #2d3748;
            --status-bg: #2d3748;
        }
        * {
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Inter', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(255, 195, 0, 0.14), transparent 35%),
                radial-gradient(circle at bottom right, rgba(26, 26, 26, 0.05), transparent 28%),
                var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .contenedor {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 600px;
            margin-top: 40px;
            position: relative;
            border: 1px solid var(--border-color);
            animation: fadeInUp 0.6s ease both;
            overflow: visible;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
        .btn-dark-mode {
            position: absolute;
            top: 25px;
            right: 25px;
            background: var(--bg-body);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            color: var(--text-main);
            z-index: 10;
        }
        .btn-dark-mode:hover {
            transform: scale(1.05);
            border-color: var(--primary);
        }
        h2 {
            text-align: center;
            margin: 0 0 34px 0;
            font-weight: 300;
            font-size: 2.2em;
            letter-spacing: -1px;
            position: relative;
            animation: fadeInDown 0.55s ease both;
        }
        h2 strong {
            color: var(--secondary);
            font-weight: 800;
            border-bottom: 4px solid var(--primary);
        }
        .status-box {
            background: var(--status-bg);
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.3s ease;
        }
        .status-box:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(0,0,0,0.04);
        }
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 700;
            color: var(--secondary);
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .input-group {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .search-wrap {
            position: relative;
        }
        input[type="text"] {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid var(--border-color);
            border-radius: 14px;
            outline: none;
            font-size: 1.05em;
            transition: all 0.22s ease;
            box-sizing: border-box;
            background: var(--input-bg);
            color: var(--text-main);
            box-shadow: 0 0 0 rgba(255, 195, 0, 0);
        }
        
        input[type="text"]:focus {
            border-color: var(--primary);
            background: var(--card-bg);
            box-shadow: 0 0 0 4px rgba(255, 195, 0, 0.12);
            transform: translateY(-1px);
        }
        input[type="text"]::placeholder {
            color: var(--text-light);
        }
        .btn-buscar {
            padding: 16px;
            background-color: var(--secondary);
            color: var(--card-bg);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 800;
            font-size: 1em;
            transition: transform 0.18s ease, box-shadow 0.22s ease, background-color 0.22s ease;
            will-change: transform;
        }
        
        body.dark-mode .btn-buscar {
            background-color: var(--primary);
            color: #121212;
        }
        .btn-buscar:hover {
            background-color: #333;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.10);
        }
        body.dark-mode .btn-buscar:hover {
            background-color: var(--primary-dark);
        }
        .btn-buscar:active {
            transform: translateY(0) scale(0.99);
        }
        #resultado {
            margin-top: 36px;
            display: grid;
            gap: 14px;
        }
        
        .result-card {
            background: var(--card-bg);
            padding: 24px;
            border: 1px solid var(--border-color);
            border-radius: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
            animation: slideUp 0.42s ease forwards;
            opacity: 0;
            flex-wrap: wrap; /* Permitir que los botones se acomoden */
        }
        .result-card.show {
            opacity: 1;
        }
        .result-card:hover {
            border-color: var(--primary);
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 12px 24px rgba(0,0,0,0.08);
        }
        .instituto-info {
            flex: 1 1 auto;
            min-width: 0;
        }
        .instituto-nombre {
            font-size: 1.08em;
            font-weight: 800;
            color: var(--secondary);
            margin-bottom: 6px;
            line-height: 1.25;
        }
        .meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 6px;
        }
        .pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 0.78em;
            font-weight: 700;
            background: var(--status-bg);
            color: var(--text-light);
        }
        .btn-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .btn-wiki {
            padding: 10px 18px;
            background-color: var(--primary);
            color: #1a1a1a;
            text-decoration: none;
            border: none;
            border-radius: 10px;
            font-weight: 800;
            font-family: inherit;
            font-size: 0.85em;
            cursor: pointer;
            display: inline-block;
            transition: transform 0.18s ease, background-color 0.18s ease, box-shadow 0.18s ease;
            white-space: nowrap;
            box-shadow: 0 8px 16px rgba(255, 195, 0, 0.20);
        }
        .btn-wiki:hover {
            background-color: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(255, 195, 0, 0.26);
        }
        .btn-wiki:active {
            transform: translateY(0) scale(0.99);
        }
        .status-text { color: var(--text-light); font-size: 0.85em; font-weight: 600; }
        .sin-wiki { color: var(--text-light); font-size: 0.85em; font-style: italic; }
        .search-hint {
            font-size: 0.82em;
            color: var(--text-light);
            margin-top: -6px;
            animation: fadeIn 0.35s ease both;
        }
        .resultado-vacio {
            text-align:center;
            padding: 30px;
            background: var(--status-bg);
            border-radius: 18px;
            color: #e74c3c;
            border: 1px solid var(--border-color);
            animation: fadeIn 0.35s ease both;
        }
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(0,0,0,0.12);
            border-top-color: var(--secondary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        body.dark-mode .spinner {
            border: 2px solid rgba(255,255,255,0.12);
            border-top-color: var(--primary);
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .results-count {
            margin: 0 0 10px 0;
            color: var(--text-light);
            font-size: 0.82em;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        /* --- ESTILOS DEL MODAL DE CARRERAS --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            opacity: 0;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }
        .modal-content {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            position: relative;
            transform: translateY(20px);
            transition: transform 0.3s ease, background-color 0.3s ease, border-color 0.3s ease;
        }
        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--status-bg);
            border: 1px solid var(--border-color);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            cursor: pointer;
            color: var(--text-main);
            transition: all 0.2s;
        }
        .modal-close:hover { 
            background: var(--primary); 
            color: #1a1a1a;
            border-color: var(--primary);
        }
        .modal-title { 
            margin-top: 0; 
            font-weight: 800; 
            color: var(--secondary); 
            margin-bottom: 20px;
            padding-right: 30px;
            font-size: 1.4em;
        }
        .carreras-container {
            overflow-y: auto;
            padding-right: 5px;
        }
        /* Scrollbar styles for the modal */
        .carreras-container::-webkit-scrollbar { width: 6px; }
        .carreras-container::-webkit-scrollbar-track { background: var(--bg-body); border-radius: 4px; }
        .carreras-container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        
        .carreras-list {
            list-style: none; 
            padding: 0; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
        }
        .carreras-list li {
            background: var(--status-bg);
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.95em;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            font-weight: 600;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }
        .carreras-list li:hover {
            transform: translateX(4px);
            border-color: var(--primary);
        }

        /* BOTÓN DE AYUDA */
        .help-container {
            position: fixed;
            right: 24px;
            bottom: 24px;
            z-index: 9999;
        }
        .help-btn {
            width: 54px;
            height: 54px;
            border: none;
            border-radius: 50%;
            background: var(--primary);
            color: #1a1a1a;
            font-size: 1.4em;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 14px 28px rgba(0,0,0,0.18);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .help-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 18px 32px rgba(0,0,0,0.22);
            background: var(--primary-dark);
        }
        .help-box {
            position: absolute;
            bottom: 68px;
            right: 0;
            width: 250px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: var(--shadow);
            padding: 16px 18px;
            color: var(--text-main);
            display: none;
            animation: fadeInUp 0.25s ease both;
            font-size: 0.88em;
            line-height: 1.45;
        }
        .help-box strong {
            display: block;
            margin-bottom: 6px;
            color: var(--secondary);
            font-size: 1em;
        }
        .help-mail {
            font-weight: 800;
            color: var(--secondary);
            word-break: break-word;
        }

        @media (max-width: 640px) {
            body { padding: 14px; }
            .contenedor {
                padding: 26px 18px;
                margin-top: 16px;
                border-radius: 20px;
            }
            .btn-dark-mode {
                top: 15px;
                right: 15px;
            }
            h2 {
                font-size: 1.8em;
                margin-bottom: 24px;
            }
            .result-card {
                flex-direction: column;
                align-items: stretch;
            }
            .btn-actions {
                flex-direction: column;
                width: 100%;
            }
            .btn-wiki {
                width: 100%;
                text-align: center;
                display: block;
            }
            .help-container {
                right: 16px;
                bottom: 16px;
            }
            .help-box {
                width: min(250px, calc(100vw - 32px));
            }
        }
    </style>
</head>
<body>
<div class="contenedor">
    <button id="btnDarkMode" class="btn-dark-mode" title="Alternar modo oscuro">🌙</button>
    <h2>Buscador <strong>UNID</strong></h2>
    <div class="status-box">
        <span class="status-text" style="color:var(--secondary)">Estado:</span>
        <span id="statusCarga" class="status-text"><span class="spinner"></span> Conectando base de datos...</span>
    </div>
    <div class="input-group">
        <label>Documentación del Campus o Carrera</label>
        <div class="search-wrap">
            <input type="text" id="textoBusqueda" placeholder="Ej: Monterrey, Derecho, Diseño..." autocomplete="off">
        </div>
        <div class="search-hint">Escribe para buscar en vivo. No es necesario presionar Enter.</div>
        <button class="btn-buscar" id="btnBuscar" onclick="buscarInstituto()">Realizar Búsqueda</button>
    </div>
    <div id="resultado">
        <p style="color: var(--text-light); text-align: center; font-size: 0.9em;">Esperando entrada de datos...</p>
    </div>
</div>

<div class="help-container">
    <div id="helpBox" class="help-box">
        <strong>¿Dudas o sugerencias?</strong>
        Si detectas algo que se pueda mejorar, contáctame por Teams:<br>
        <span class="help-mail">abraham.quintero@unid.mx</span>
    </div>
    <button id="helpBtn" class="help-btn" title="Ayuda">?</button>
</div>

<div id="modalCarreras" class="modal-overlay">
    <div class="modal-content">
        <button class="modal-close" onclick="cerrarModalCarreras()">✕</button>
        <h3 id="modalTitle" class="modal-title">Carreras Ofertadas</h3>
        <div class="carreras-container">
            <ul id="modalList" class="carreras-list">
                </ul>
        </div>
    </div>
</div>

<script>
    // Gestión del Modo Noche
    const btnDarkMode = document.getElementById('btnDarkMode');
    const toggleDarkMode = () => {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        btnDarkMode.innerText = isDark ? '☀️' : '🌙';
    };
    if(localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        btnDarkMode.innerText = '☀️';
    }
    btnDarkMode.addEventListener('click', toggleDarkMode);

    // Lógica del Buscador
    let todosLosDatos = [];
    const archivosA_Cargar = ['database.xlsx'];
    let debounceTimer = null;

    function normalizarTexto(texto) {
        return (texto ?? "")
            .toString()
            .toLowerCase()
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .trim();
    }
    
    function escapeHtml(texto) {
        return (texto ?? "")
            .toString()
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll("\"", "&quot;")
            .replaceAll("'", "&#39;");
    }
    
    function obtenerLinkWiki(encontrado) {
        let linkWiki = null;
        Object.keys(encontrado).forEach(columna => {
            let nomCol = columna.toLowerCase().trim();
            if (nomCol.includes("wiki") || nomCol.includes("link") || nomCol.includes("url")) {
                linkWiki = encontrado[columna];
            }
        });
        return linkWiki;
    }

    function obtenerCarreras(encontrado) {
        let carrerasStr = "";
        Object.keys(encontrado).forEach(columna => {
            let nomCol = columna.toLowerCase().trim();
            // Detecta columnas que contengan la oferta de carreras
            if (nomCol.includes("carrera") || nomCol.includes("oferta") || nomCol.includes("programa") || nomCol.includes("licenciatura")) {
                if (encontrado[columna]) {
                    carrerasStr += encontrado[columna] + ", ";
                }
            }
        });
        // Quita la última coma y espacio si existe
        return carrerasStr.replace(/,\s*$/, "");
    }

    function limpiarBusqueda() {
        document.getElementById('textoBusqueda').value = '';
    }

    function actualizarBusquedaEnVivo() {
        const texto = document.getElementById('textoBusqueda').value;
        const busqueda = normalizarTexto(texto);
        if (debounceTimer) clearTimeout(debounceTimer);
        
        if (!busqueda) {
            document.getElementById('resultado').innerHTML = "<p style='color: var(--text-light); text-align: center; font-size: 0.9em;'>Escribe para buscar institutos o carreras.</p>";
            return;
        }
        
        debounceTimer = setTimeout(() => {
            buscarInstituto();
        }, 220);
    }

    window.onload = async function() {
        let procesados = 0;
        const status = document.getElementById('statusCarga');
        status.innerHTML = "<span class='spinner'></span> Cargando base de datos...";
        for (const nombreArchivo of archivosA_Cargar) {
            try {
                const response = await fetch(nombreArchivo);
                if (!response.ok) throw new Error("Archivo no encontrado");
                
                const arrayBuffer = await response.arrayBuffer();
                const data = new Uint8Array(arrayBuffer);
                const libro = XLSX.read(data, {type: 'array'});
                const hoja = libro.Sheets[libro.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(hoja);
                
                todosLosDatos = todosLosDatos.concat(json);
                procesados++;
            } catch (error) {
                console.error("Error cargando archivo", error);
            }
        }
        
        if (procesados > 0) {
            document.getElementById('statusCarga').innerHTML = "🟢 " + todosLosDatos.length + " registros listos";
            document.getElementById('resultado').innerHTML = "<p style='color: var(--text-light); text-align: center; font-size: 0.9em;'>Listo para buscar.</p>";
        } else {
            document.getElementById('statusCarga').innerHTML = "🔴 Error de conexión";
            document.getElementById('resultado').innerHTML = "<div class='resultado-vacio'>No fue posible cargar la base de datos.</div>";
        }
    };

    function buscarInstituto() {
        const busquedaOriginal = document.getElementById('textoBusqueda').value.trim();
        const busqueda = normalizarTexto(busquedaOriginal);
        const caja = document.getElementById('resultado');

        if (todosLosDatos.length === 0) {
            caja.innerHTML = `<p style="color:#d63031; text-align:center;">Base de datos no disponible.</p>`;
            return;
        }
        if (busqueda === "") {
            caja.innerHTML = `<p style="color:var(--text-light); text-align:center;">Por favor, ingresa una búsqueda.</p>`;
            return;
        }

        // Modificado para buscar por Nombre de campus O por Carrera
        const resultados = todosLosDatos.filter(fila => {
            const nombreCampus = normalizarTexto(fila.Nombre);
            const carrerasCampus = normalizarTexto(obtenerCarreras(fila));
            return nombreCampus.includes(busqueda) || carrerasCampus.includes(busqueda);
        });

        if (resultados.length > 0) {
            let htmlTotal = `<p class="results-count">MOSTRANDO ${resultados.length} RESULTADO(S)</p>`;
            resultados.forEach((encontrado, idx) => {
                let linkWiki = obtenerLinkWiki(encontrado);
                let carrerasInfo = obtenerCarreras(encontrado);
                const nombreReal = encontrado.Nombre || "Campus Sin Nombre";
                const tipo = encontrado.Tipo || "Instituto";
                const zona = encontrado.Zona ? `Zona ${encontrado.Zona}` : "";
                const nombreHtml = escapeHtml(nombreReal);
                const tipoHtml = escapeHtml(tipo);
                const zonaHtml = escapeHtml(zona);

                let htmlResultado = `
                    <div class="result-card" style="animation-delay:${Math.min(idx * 0.05, 0.22)}s;">
                        <div class="instituto-info">
                            <div class="instituto-nombre">${nombreHtml}</div>
                            <div class="meta-row">
                                <span class="pill"><i class="fas fa-tag"></i> ${tipoHtml}</span>
                                ${zona ? `<span class="pill"><i class="fas fa-map-marker-alt"></i> ${zonaHtml}</span>` : ""}
                            </div>
                        </div>
                        <div class="btn-actions">
                `;
                
                // Botón de Ver Carreras
                if(carrerasInfo && carrerasInfo.trim() !== "") {
                    htmlResultado += `
                        <button class="btn-wiki btn-ver-carreras" data-nombre="${nombreHtml}" data-carreras="${escapeHtml(carrerasInfo)}">
                            Ver carreras 🎓
                        </button>
                    `;
                }

                // Botón de Abrir Wiki original
                if (linkWiki && linkWiki.toString().trim() !== "") {
                    let urlFinal = linkWiki.toString().trim();
                    if (!urlFinal.startsWith('http')) {
                        urlFinal = 'https://' + urlFinal;
                    }
                    htmlResultado += `
                        <a href="${escapeHtml(urlFinal)}" target="_blank" onclick="limpiarBusqueda()" class="btn-wiki">
                            abrir wiki ↗
                        </a>
                    `;
                } else if (!carrerasInfo || carrerasInfo.trim() === "") {
                    // Si no hay wiki y tampoco carreras, mostrar mensaje
                    htmlResultado += `<span class="sin-wiki">Sin links o carreras</span>`;
                }
                
                htmlResultado += `</div></div>`;
                htmlTotal += htmlResultado;
            });
            caja.innerHTML = htmlTotal;
            
            // Asignar eventos a los botones de carreras generados
            document.querySelectorAll('.btn-ver-carreras').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    abrirModalCarreras(e.target.getAttribute('data-nombre'), e.target.getAttribute('data-carreras'));
                });
            });

            requestAnimationFrame(() => {
                document.querySelectorAll('.result-card').forEach(card => card.classList.add('show'));
            });
        } else {
            caja.innerHTML = `<div class="resultado-vacio">No hay resultados para "${escapeHtml(busquedaOriginal)}".</div>`;
        }
    }

    // --- FUNCIONES DEL MODAL DE CARRERAS ---
    function abrirModalCarreras(nombreCampus, carrerasStr) {
        const modal = document.getElementById('modalCarreras');
        const title = document.getElementById('modalTitle');
        const list = document.getElementById('modalList');
        
        title.textContent = `Carreras en ${nombreCampus}`;
        list.innerHTML = "";
        
        // Separa las carreras por comas (o saltos de línea dependiendo de cómo estén en el excel)
        let carrerasArray = carrerasStr.split(',').map(c => c.trim()).filter(c => c);
        
        if(carrerasArray.length > 0) {
            carrerasArray.forEach(carrera => {
                const li = document.createElement('li');
                li.textContent = carrera;
                list.appendChild(li);
            });
        } else {
            list.innerHTML = "<li>No hay información detallada de las carreras.</li>";
        }
        
        modal.style.display = 'flex';
        // Delay para permitir que la transición CSS actúe
        setTimeout(() => modal.classList.add('active'), 10);
    }

    function cerrarModalCarreras() {
        const modal = document.getElementById('modalCarreras');
        modal.classList.remove('active');
        setTimeout(() => modal.style.display = 'none', 300); // Espera a que termine la animación
    }

    // Cerrar el modal al hacer clic en el fondo gris (overlay)
    document.getElementById('modalCarreras').addEventListener('click', (e) => {
        if(e.target === document.getElementById('modalCarreras')) {
            cerrarModalCarreras();
        }
    });

    // Eventos
    document.getElementById('textoBusqueda').addEventListener('input', actualizarBusquedaEnVivo);
    document.getElementById('textoBusqueda').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            buscarInstituto();
        }
    });
    document.getElementById('btnBuscar').addEventListener('mousedown', function() {
        this.style.transform = 'translateY(0) scale(0.99)';
    });
    document.getElementById('btnBuscar').addEventListener('mouseup', function() {
        this.style.transform = '';
    });

    /* BOTÓN DE AYUDA */
    const helpBtn = document.getElementById('helpBtn');
    const helpBox = document.getElementById('helpBox');
    helpBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (helpBox.style.display === 'block') {
            helpBox.style.display = 'none';
        } else {
            helpBox.style.display = 'block';
        }
    });
    document.addEventListener('click', function(e) {
        const helpContainer = document.querySelector('.help-container');
        if (!helpContainer.contains(e.target)) {
            helpBox.style.display = 'none';
        }
    });
</script>
</body>
