<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador Interno | UNID</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #FFC300;
            --primary-dark: #e6b000;
            --secondary: #1a1a1a;
            --bg-body: #f4f7f9;
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --text-light: #636e72;
            --border-color: #edf2f7;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .contenedor { 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); 
            width: 100%; 
            max-width: 600px; 
            margin-top: 40px;
            position: relative;
        }

        h2 { 
            text-align: center; 
            margin: 0 0 40px 0;
            font-weight: 300; 
            font-size: 2.2em;
            letter-spacing: -1px;
        }
        h2 strong {
            color: var(--secondary); 
            font-weight: 800;
            border-bottom: 4px solid var(--primary);
        }

        .status-box {
            background: #f8fafc;
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        label { 
            display: block; 
            margin-bottom: 10px; 
            font-weight: 600; 
            color: var(--secondary); 
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input[type="text"] { 
            width: 100%; 
            padding: 16px 20px; 
            border: 2px solid var(--border-color); 
            border-radius: 14px; 
            outline: none; 
            font-size: 1.1em;
            transition: all 0.2s ease; 
            box-sizing: border-box;
            background: #fafafa;
        }
        
        input[type="text"]:focus { 
            border-color: var(--primary); 
            background: #fff;
            box-shadow: 0 0 0 4px rgba(255, 195, 0, 0.1); 
        }

        .btn-buscar { 
            padding: 16px; 
            background-color: var(--secondary); 
            color: white; 
            border: none; 
            border-radius: 14px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 1em;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .btn-buscar:hover { 
            background-color: #333;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        #resultado { margin-top: 40px; }
        
        .result-card { 
            background: #ffffff; 
            padding: 24px; 
            border: 1px solid var(--border-color);
            border-radius: 18px; 
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease; 
            animation: slideUp 0.4s ease forwards;
        }
        .result-card:hover {
            border-color: var(--primary);
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .instituto-info { flex: 1; }
        .instituto-nombre { font-size: 1.1em; font-weight: 700; color: var(--secondary); margin-bottom: 4px; }

        .btn-wiki { 
            padding: 10px 18px; 
            background-color: var(--primary); 
            color: var(--secondary); 
            text-decoration: none; 
            border-radius: 10px; 
            font-weight: 700; 
            font-size: 0.85em;
            transition: all 0.2s; 
            white-space: nowrap;
        }
        .btn-wiki:hover { background-color: var(--primary-dark); }

        .status-text { color: var(--text-light); font-size: 0.85em; font-weight: 500; }
        .sin-wiki { color: #b2bec3; font-size: 0.85em; font-style: italic; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="contenedor">
    <h2>Buscador <strong>UNID</strong></h2>

    <div class="status-box">
        <span class="status-text" style="color:var(--secondary)">Estado:</span>
        <span id="statusCarga" class="status-text">Conectando base de datos... ⏳</span>
    </div>

    <div class="input-group">
        <label>Documentación del Instituto</label>
        <input type="text" id="textoBusqueda" placeholder="Ej: Instituto Tecnológico...">
        <button class="btn-buscar" onclick="buscarInstituto()">Realizar Búsqueda</button>
    </div>

    <div id="resultado">
        <p style="color: #b2bec3; text-align: center; font-size: 0.9em;">Esperando entrada de datos...</p>
    </div>
</div>

<script>
    let todosLosDatos = [];
    const archivosA_Cargar = ['database.xlsx']; 

    window.onload = async function() {
        let procesados = 0;
        for (const nombreArchivo of archivosA_Cargar) {
            try {
                const response = await fetch(nombreArchivo);
                if (!response.ok) throw new Error("Archivo no encontrado");
                
                const arrayBuffer = await response.arrayBuffer();
                const data = new Uint8Array(arrayBuffer);
                const libro = XLSX.read(data, {type: 'array'});
                const hoja = libro.Sheets[libro.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(hoja);
                
                todosLosDatos = todosLosDatos.concat(json);
                procesados++;
            } catch (error) {
                console.error("Error cargando archivo", error);
            }
        }
        
        if (procesados > 0) {
            document.getElementById('statusCarga').innerHTML = "🟢 " + todosLosDatos.length + " registros listos";
            document.getElementById('resultado').innerHTML = "<p style='color: #b2bec3; text-align: center; font-size: 0.9em;'>Listo para buscar.</p>";
        } else {
            document.getElementById('statusCarga').innerHTML = "🔴 Error de conexión";
        }
    };

    function buscarInstituto() {
        const busqueda = document.getElementById('textoBusqueda').value.toLowerCase().trim();
        const caja = document.getElementById('resultado');

        if (todosLosDatos.length === 0) {
            caja.innerHTML = `<p style="color:#d63031; text-align:center;">Base de datos no disponible.</p>`;
            return;
        }

        if (busqueda === "") {
            caja.innerHTML = `<p style="color:#b2bec3; text-align:center;">Por favor, ingresa un nombre.</p>`;
            return;
        }

        const resultados = todosLosDatos.filter(fila => 
            fila.Nombre && fila.Nombre.toString().toLowerCase().includes(busqueda)
        );

        if (resultados.length > 0) {
            let htmlTotal = `<p style="color: var(--text-light); font-size: 0.8em; margin-bottom: 20px; font-weight:600;">MOSTRANDO ${resultados.length} RESULTADO(S)</p>`;

            resultados.forEach(encontrado => {
                let linkWiki = null;
                Object.keys(encontrado).forEach(columna => {
                    let nomCol = columna.toLowerCase().trim();
                    if (nomCol.includes("wiki") || nomCol.includes("link") || nomCol.includes("url")) {
                        linkWiki = encontrado[columna];
                    }
                });

                const nombreReal = encontrado.Nombre;
                let htmlResultado = `
                    <div class="result-card">
                        <div class="instituto-info">
                            <div class="instituto-nombre">${nombreReal}</div>
                        </div>
                `;

                if (linkWiki && linkWiki.toString().trim() !== "") {
                    let urlFinal = linkWiki.toString().trim();
                    if (!urlFinal.startsWith('http')) {
                        urlFinal = 'https://' + urlFinal;
                    }
                    htmlResultado += `
                        <a href="${urlFinal}" target="_blank" class="btn-wiki">
                            Abrir Wiki ↗
                        </a>
                    `;
                } else {
                    htmlResultado += `<span class="sin-wiki">Sin link</span>`;
                }

                htmlResultado += `</div>`;
                htmlTotal += htmlResultado;
            });

            caja.innerHTML = htmlTotal;
        } else {
            caja.innerHTML = `<div style="text-align:center; padding: 30px; background: #fff5f5; border-radius: 18px; color: #c0392b; border: 1px solid #ffeaea;">No hay resultados para "${busqueda}".</div>`;
        }
    }

    document.getElementById('textoBusqueda').addEventListener('keypress', (e) => { 
        if (e.key === 'Enter') buscarInstituto(); 
    });
</script>

</body>
</html>
