<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador Interno | UNID</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #FFC300;
            --primary-dark: #e6b000;
            --secondary: #1a1a1a;
            --bg-body: #f4f7f9;
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --text-light: #636e72;
            --border-color: #edf2f7;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.10), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --input-bg: #fafafa;
            --status-bg: #f8fafc;
        }

        /* Variables Modo Noche */
        body.dark-mode {
            --secondary: #f8f9fa;
            --bg-body: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e2e8f0;
            --text-light: #a0aec0;
            --border-color: #333333;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            --input-bg: #2d3748;
            --status-bg: #2d3748;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background:
                radial-gradient(circle at top left, rgba(255, 195, 0, 0.14), transparent 35%),
                radial-gradient(circle at bottom right, rgba(26, 26, 26, 0.05), transparent 28%),
                var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .contenedor { 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: var(--shadow);
            width: 100%; 
            max-width: 600px; 
            margin-top: 40px;
            position: relative;
            border: 1px solid var(--border-color);
            animation: fadeInUp 0.6s ease both;
            overflow: visible;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .btn-dark-mode {
            position: absolute;
            top: 25px;
            right: 25px;
            background: var(--bg-body);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            color: var(--text-main);
            z-index: 10;
        }

        .btn-dark-mode:hover {
            transform: scale(1.05);
            border-color: var(--primary);
        }

        h2 { 
            text-align: center; 
            margin: 0 0 34px 0;
            font-weight: 300; 
            font-size: 2.2em;
            letter-spacing: -1px;
            position: relative;
            animation: fadeInDown 0.55s ease both;
        }
        h2 strong {
            color: var(--secondary); 
            font-weight: 800;
            border-bottom: 4px solid var(--primary);
        }

        .status-box {
            background: var(--status-bg);
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.3s ease;
        }

        .status-box:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(0,0,0,0.04);
        }

        label { 
            display: block; 
            margin-bottom: 10px; 
            font-weight: 700; 
            color: var(--secondary); 
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .search-wrap {
            position: relative;
        }

        input[type="text"] { 
            width: 100%; 
            padding: 16px 20px; 
            border: 2px solid var(--border-color); 
            border-radius: 14px; 
            outline: none; 
            font-size: 1.05em;
            transition: all 0.22s ease; 
            box-sizing: border-box;
            background: var(--input-bg);
            color: var(--text-main);
            box-shadow: 0 0 0 rgba(255, 195, 0, 0);
        }
        
        input[type="text"]:focus { 
            border-color: var(--primary); 
            background: var(--card-bg);
            box-shadow: 0 0 0 4px rgba(255, 195, 0, 0.12); 
            transform: translateY(-1px);
        }

        input[type="text"]::placeholder {
            color: var(--text-light);
        }

        .btn-buscar { 
            padding: 16px; 
            background-color: var(--secondary); 
            color: var(--card-bg); 
            border: none; 
            border-radius: 14px; 
            cursor: pointer; 
            font-weight: 800; 
            font-size: 1em;
            transition: transform 0.18s ease, box-shadow 0.22s ease, background-color 0.22s ease; 
            will-change: transform;
        }
        
        body.dark-mode .btn-buscar {
            background-color: var(--primary);
            color: #121212;
        }

        .btn-buscar:hover { 
            background-color: #333;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.10);
        }

        body.dark-mode .btn-buscar:hover {
            background-color: var(--primary-dark);
        }

        .btn-buscar:active {
            transform: translateY(0) scale(0.99);
        }

        #resultado { 
            margin-top: 36px;
            display: grid;
            gap: 14px;
        }
        
        .result-card { 
            background: var(--card-bg); 
            padding: 24px; 
            border: 1px solid var(--border-color);
            border-radius: 18px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease; 
            animation: slideUp 0.42s ease forwards;
            opacity: 0;
        }

        .result-card.show {
            opacity: 1;
        }

        .result-card:hover {
            border-color: var(--primary);
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 12px 24px rgba(0,0,0,0.08);
        }

        .instituto-info { 
            flex: 1;
            min-width: 0;
        }

        .instituto-nombre { 
            font-size: 1.08em; 
            font-weight: 800; 
            color: var(--secondary); 
            margin-bottom: 6px;
            line-height: 1.25;
        }

        .meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 6px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 0.78em;
            font-weight: 700;
            background: var(--status-bg);
            color: var(--text-light);
        }

        .btn-wiki { 
            padding: 10px 18px; 
            background-color: var(--primary); 
            color: #1a1a1a; 
            text-decoration: none; 
            border-radius: 10px; 
            font-weight: 800; 
            font-size: 0.85em;
            transition: transform 0.18s ease, background-color 0.18s ease, box-shadow 0.18s ease; 
            white-space: nowrap;
            box-shadow: 0 8px 16px rgba(255, 195, 0, 0.20);
        }
        .btn-wiki:hover { 
            background-color: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(255, 195, 0, 0.26);
        }
        .btn-wiki:active {
            transform: translateY(0) scale(0.99);
        }

        .status-text { color: var(--text-light); font-size: 0.85em; font-weight: 600; }
        .sin-wiki { color: var(--text-light); font-size: 0.85em; font-style: italic; }

        .search-hint {
            font-size: 0.82em;
            color: var(--text-light);
            margin-top: -6px;
            animation: fadeIn 0.35s ease both;
        }

        .sugerencias {
            display: none;
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            z-index: 50;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            box-shadow: 0 18px 34px rgba(0,0,0,0.12);
            overflow: hidden;
            max-height: 280px;
            overflow-y: auto;
            transform-origin: top;
            animation: popIn 0.16s ease both;
        }

        .sugerencia-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
            font-weight: 700;
            color: var(--text-main);
            transition: background-color 0.15s ease, transform 0.15s ease;
        }

        .sugerencia-item:hover {
            background: var(--status-bg);
            transform: translateX(2px);
        }

        .sugerencia-item:last-child {
            border-bottom: none;
        }

        .sugerencia-main {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
        }

        .sugerencia-sub {
            display: block;
            margin-top: 4px;
            font-size: 0.78em;
            font-weight: 600;
            color: var(--text-light);
        }

        .resultado-vacio {
            text-align:center;
            padding: 30px;
            background: var(--status-bg);
            border-radius: 18px;
            color: #e74c3c;
            border: 1px solid var(--border-color);
            animation: fadeIn 0.35s ease both;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(0,0,0,0.12);
            border-top-color: var(--secondary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        body.dark-mode .spinner {
            border: 2px solid rgba(255,255,255,0.12);
            border-top-color: var(--primary);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.98) translateY(-4px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .results-count {
            margin: 0 0 10px 0;
            color: var(--text-light);
            font-size: 0.82em;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        /* BOTÓN DE AYUDA */
        .help-container {
            position: fixed;
            right: 24px;
            bottom: 24px;
            z-index: 9999;
        }

        .help-btn {
            width: 54px;
            height: 54px;
            border: none;
            border-radius: 50%;
            background: var(--primary);
            color: #1a1a1a;
            font-size: 1.4em;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 14px 28px rgba(0,0,0,0.18);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .help-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 18px 32px rgba(0,0,0,0.22);
            background: var(--primary-dark);
        }

        .help-box {
            position: absolute;
            bottom: 68px;
            right: 0;
            width: 250px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: var(--shadow);
            padding: 16px 18px;
            color: var(--text-main);
            display: none;
            animation: fadeInUp 0.25s ease both;
            font-size: 0.88em;
            line-height: 1.45;
        }

        .help-box strong {
            display: block;
            margin-bottom: 6px;
            color: var(--secondary);
            font-size: 1em;
        }

        .help-mail {
            font-weight: 800;
            color: var(--secondary);
            word-break: break-word;
        }

        @media (max-width: 640px) {
            body { padding: 14px; }
            .contenedor {
                padding: 26px 18px;
                margin-top: 16px;
                border-radius: 20px;
            }
            .btn-dark-mode {
                top: 15px;
                right: 15px;
            }
            h2 {
                font-size: 1.8em;
                margin-bottom: 24px;
            }
            .result-card {
                flex-direction: column;
                align-items: stretch;
            }
            .btn-wiki {
                width: 100%;
                text-align: center;
            }
            .help-container {
                right: 16px;
                bottom: 16px;
            }
            .help-box {
                width: min(250px, calc(100vw - 32px));
            }
        }
    </style>
</head>
<body>

<div class="contenedor">
    <button id="btnDarkMode" class="btn-dark-mode" title="Alternar modo oscuro">🌙</button>
    <h2>Buscador <strong>UNID</strong></h2>

    <div class="status-box">
        <span class="status-text" style="color:var(--secondary)">Estado:</span>
        <span id="statusCarga" class="status-text"><span class="spinner"></span> Conectando base de datos...</span>
    </div>

    <div class="input-group">
        <label>Documentación del Campus</label>
        <div class="search-wrap">
            <input type="text" id="textoBusqueda" placeholder="Ej: Monterrey..." autocomplete="off">
            <div id="sugerencias" class="sugerencias"></div>
        </div>
        <div class="search-hint">Escribe para ver sugerencias en vivo o presiona Enter para buscar.</div>
        <button class="btn-buscar" id="btnBuscar" onclick="buscarInstituto()">Realizar Búsqueda</button>
    </div>

    <div id="resultado">
        <p style="color: var(--text-light); text-align: center; font-size: 0.9em;">Esperando entrada de datos...</p>
    </div>
</div>

<!-- BOTÓN DE AYUDA -->
<div class="help-container">
    <div id="helpBox" class="help-box">
        <strong>¿Dudas o sugerencias?</strong>
        Si detectas algo que se pueda mejorar, contáctame por Teams:<br>
        <span class="help-mail">abraham.quintero@unid.mx</span>
    </div>
    <button id="helpBtn" class="help-btn" title="Ayuda">?</button>
</div>

<script>
    // Gestión del Modo Noche
    const btnDarkMode = document.getElementById('btnDarkMode');
    const toggleDarkMode = () => {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        btnDarkMode.innerText = isDark ? '☀️' : '🌙';
    };

    if(localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        btnDarkMode.innerText = '☀️';
    }

    btnDarkMode.addEventListener('click', toggleDarkMode);


    // Lógica del Buscador Original
    let todosLosDatos = [];
    const archivosA_Cargar = ['database.xlsx'];

    let sugerenciasActuales = [];
    let debounceTimer = null;
    let buscandoAutomaticamente = false;

    function normalizarTexto(texto) {
        return (texto ?? "")
            .toString()
            .toLowerCase()
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .trim();
    }

    function escapeHtml(texto) {
        return (texto ?? "")
            .toString()
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll("\"", "&quot;")
            .replaceAll("'", "&#39;");
    }

    function obtenerLinkWiki(encontrado) {
        let linkWiki = null;
        Object.keys(encontrado).forEach(columna => {
            let nomCol = columna.toLowerCase().trim();
            if (nomCol.includes("wiki") || nomCol.includes("link") || nomCol.includes("url")) {
                linkWiki = encontrado[columna];
            }
        });
        return linkWiki;
    }

    function renderSugerencias(lista) {
        const caja = document.getElementById("sugerencias");

        if (!lista.length) {
            caja.innerHTML = "";
            caja.style.display = "none";
            return;
        }

        caja.innerHTML = lista.map((item, index) => {
            const nombre = escapeHtml(item.Nombre || "Sin nombre");
            const tipo = escapeHtml(item.Tipo || "Instituto");
            const extra = item.Zona ? ` • Zona ${escapeHtml(item.Zona)}` : "";
            return `
                <div class="sugerencia-item" data-index="${index}">
                    <div class="sugerencia-main">
                        <span>${nombre}</span>
                        <i class="fas fa-arrow-right" style="font-size:0.75em; opacity:0.45;"></i>
                    </div>
                    <span class="sugerencia-sub">${tipo}${extra}</span>
                </div>
            `;
        }).join("");

        caja.style.display = "block";
    }

    function actualizarSugerenciasYBusqueda() {
        const texto = document.getElementById('textoBusqueda').value;
        const busqueda = normalizarTexto(texto);

        if (debounceTimer) clearTimeout(debounceTimer);

        if (!busqueda) {
            sugerenciasActuales = [];
            renderSugerencias([]);
            if (!buscandoAutomaticamente) {
                document.getElementById('resultado').innerHTML = "<p style='color: var(--text-light); text-align: center; font-size: 0.9em;'>Escribe para buscar institutos.</p>";
            }
            return;
        }

        sugerenciasActuales = todosLosDatos
            .filter(fila => fila.Nombre && normalizarTexto(fila.Nombre).includes(busqueda))
            .sort((a, b) => {
                const na = normalizarTexto(a.Nombre);
                const nb = normalizarTexto(b.Nombre);
                const aStart = na.startsWith(busqueda) ? 0 : 1;
                const bStart = nb.startsWith(busqueda) ? 0 : 1;
                if (aStart !== bStart) return aStart - bStart;
                return na.localeCompare(nb, 'es');
            })
            .slice(0, 6);

        renderSugerencias(sugerenciasActuales);

        debounceTimer = setTimeout(() => {
            buscandoAutomaticamente = true;
            buscarInstituto(true);
            buscandoAutomaticamente = false;
        }, 220);
    }

    function seleccionarSugerencia(index) {
        const item = sugerenciasActuales[index];
        if (!item) return;
        document.getElementById('textoBusqueda').value = item.Nombre || "";
        document.getElementById('sugerencias').style.display = "none";
        buscarInstituto();
    }

    window.onload = async function() {
        let procesados = 0;
        const status = document.getElementById('statusCarga');
        status.innerHTML = "<span class='spinner'></span> Cargando base de datos...";

        for (const nombreArchivo of archivosA_Cargar) {
            try {
                const response = await fetch(nombreArchivo);
                if (!response.ok) throw new Error("Archivo no encontrado");
                
                const arrayBuffer = await response.arrayBuffer();
                const data = new Uint8Array(arrayBuffer);
                const libro = XLSX.read(data, {type: 'array'});
                const hoja = libro.Sheets[libro.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(hoja);
                
                todosLosDatos = todosLosDatos.concat(json);
                procesados++;
            } catch (error) {
                console.error("Error cargando archivo", error);
            }
        }
        
        if (procesados > 0) {
            document.getElementById('statusCarga').innerHTML = "🟢 " + todosLosDatos.length + " registros listos";
            document.getElementById('resultado').innerHTML = "<p style='color: var(--text-light); text-align: center; font-size: 0.9em;'>Listo para buscar.</p>";
        } else {
            document.getElementById('statusCarga').innerHTML = "🔴 Error de conexión";
            document.getElementById('resultado').innerHTML = "<div class='resultado-vacio'>No fue posible cargar la base de datos.</div>";
        }
    };

    function buscarInstituto(desdeInput = false) {
        const busquedaOriginal = document.getElementById('textoBusqueda').value.trim();
        const busqueda = normalizarTexto(busquedaOriginal);
        const caja = document.getElementById('resultado');
        document.getElementById('sugerencias').style.display = "none";

        if (todosLosDatos.length === 0) {
            caja.innerHTML = `<p style="color:#d63031; text-align:center;">Base de datos no disponible.</p>`;
            return;
        }

        if (busqueda === "") {
            caja.innerHTML = `<p style="color:var(--text-light); text-align:center;">Por favor, ingresa un nombre.</p>`;
            return;
        }

        const resultados = todosLosDatos.filter(fila => 
            fila.Nombre && normalizarTexto(fila.Nombre).includes(busqueda)
        );

        if (resultados.length > 0) {
            let htmlTotal = `<p class="results-count">MOSTRANDO ${resultados.length} RESULTADO(S)</p>`;

            resultados.forEach((encontrado, idx) => {
                let linkWiki = obtenerLinkWiki(encontrado);
                const nombreReal = encontrado.Nombre;
                const tipo = encontrado.Tipo || "Instituto";
                const zona = encontrado.Zona ? `Zona ${encontrado.Zona}` : "";
                const nombreHtml = escapeHtml(nombreReal);
                const tipoHtml = escapeHtml(tipo);
                const zonaHtml = escapeHtml(zona);

                let htmlResultado = `
                    <div class="result-card" style="animation-delay:${Math.min(idx * 0.05, 0.22)}s;">
                        <div class="instituto-info">
                            <div class="instituto-nombre">${nombreHtml}</div>
                            <div class="meta-row">
                                <span class="pill"><i class="fas fa-tag"></i> ${tipoHtml}</span>
                                ${zona ? `<span class="pill"><i class="fas fa-map-marker-alt"></i> ${zonaHtml}</span>` : ""}
                            </div>
                        </div>
                `;

                if (linkWiki && linkWiki.toString().trim() !== "") {
                    let urlFinal = linkWiki.toString().trim();
                    if (!urlFinal.startsWith('http')) {
                        urlFinal = 'https://' + urlFinal;
                    }
                    htmlResultado += `
                        <a href="${escapeHtml(urlFinal)}" target="_blank" class="btn-wiki">
                            abrir wiki ↗
                        </a>
                    `;
                } else {
                    htmlResultado += `<span class="sin-wiki">Sin link</span>`;
                }

                htmlResultado += `</div>`;
                htmlTotal += htmlResultado;
            });

            caja.innerHTML = htmlTotal;

            requestAnimationFrame(() => {
                document.querySelectorAll('.result-card').forEach(card => card.classList.add('show'));
            });
        } else {
            caja.innerHTML = `<div class="resultado-vacio">No hay resultados para "${escapeHtml(busquedaOriginal)}".</div>`;
        }
    }

    document.getElementById('textoBusqueda').addEventListener('input', actualizarSugerenciasYBusqueda);

    document.getElementById('textoBusqueda').addEventListener('keydown', (e) => { 
        if (e.key === 'Enter') {
            buscarInstituto();
        } else if (e.key === 'Escape') {
            document.getElementById('sugerencias').style.display = "none";
        }
    });

    document.getElementById('btnBuscar').addEventListener('mousedown', function() {
        this.style.transform = 'translateY(0) scale(0.99)';
    });

    document.getElementById('btnBuscar').addEventListener('mouseup', function() {
        this.style.transform = '';
    });

    document.getElementById('sugerencias').addEventListener('click', function(e) {
        const item = e.target.closest('.sugerencia-item');
        if (!item) return;
        seleccionarSugerencia(parseInt(item.dataset.index, 10));
    });

    document.addEventListener('click', function(e) {
        const wrap = document.querySelector('.search-wrap');
        const sugerencias = document.getElementById('sugerencias');
        if (!wrap.contains(e.target)) {
            sugerencias.style.display = 'none';
        }
    });

    /* BOTÓN DE AYUDA */
    const helpBtn = document.getElementById('helpBtn');
    const helpBox = document.getElementById('helpBox');

    helpBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (helpBox.style.display === 'block') {
            helpBox.style.display = 'none';
        } else {
            helpBox.style.display = 'block';
        }
    });

    document.addEventListener('click', function(e) {
        const helpContainer = document.querySelector('.help-container');
        if (!helpContainer.contains(e.target)) {
            helpBox.style.display = 'none';
        }
    });
</script>

</body>
</html>
